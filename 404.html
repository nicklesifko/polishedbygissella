<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Polished by Gissella</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg:     #F8F4EF;
            --dark:   #1A1512;
            --accent: #8B6B4A;
            --muted:  #9E8874;
            --gold:   #C9A87C;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg);
            color: var(--dark);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
            padding: 2rem;
        }

        /* Aura orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(80px);
            z-index: 0;
        }

        .orb-1 {
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, rgba(201,168,124,0.22) 0%, transparent 70%);
            top: -15%;
            left: -15%;
            animation: drift 14s infinite alternate ease-in-out;
        }

        .orb-2 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(220,185,170,0.18) 0%, transparent 70%);
            bottom: -5%;
            right: -10%;
            animation: drift 18s infinite alternate-reverse ease-in-out;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -50px) scale(1.1); }
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            max-width: 560px;
        }

        .eyebrow {
            display: block;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.25rem;
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: clamp(6rem, 18vw, 11rem);
            font-weight: 400;
            line-height: 1;
            letter-spacing: -0.03em;
            color: var(--dark);
            margin-bottom: 0.25rem;
        }

        .error-code em {
            font-style: italic;
            color: var(--accent);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            color: var(--muted);
            line-height: 1.75;
            margin-bottom: 2.5rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 0.85rem 2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-decoration: none;
            border: 2px solid var(--dark);
            transition: background 0.3s, color 0.3s, transform 0.3s;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--dark);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--dark);
        }

        .btn-outline:hover {
            background: var(--dark);
            color: #fff;
            transform: translateY(-2px);
        }

        /* Logo */
        .logo {
            position: fixed;
            top: 2rem;
            left: 5%;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--dark);
            text-decoration: none;
            z-index: 10;
        }

        /* Divider */
        .divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 2rem;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <a href="/" class="logo">Polished by Gissella</a>

    <div class="content">
        <span class="eyebrow">Error 404</span>
        <div class="error-code">Oops<em>.</em></div>
        <div class="divider"></div>
        <h1>This page doesn't exist</h1>
        <p>Looks like this link is broken or the page was moved.<br>Let's get you back to somewhere beautiful.</p>
        <div class="btn-group">
            <a href="/" class="btn btn-primary">Back to Home</a>
            <a href="/#booking" class="btn btn-outline">Book an Appointment</a>
        </div>
    </div>

</body>
</html>
